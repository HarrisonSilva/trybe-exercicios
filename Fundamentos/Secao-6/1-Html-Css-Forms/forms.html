<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulario TrybeTrip</title>
</head>
<body>
    <header>
        <h1 class="">
        TrybeTrip 
        </h1>
   </header>

    <form action="" method="GET">

        <section>  
        <label for="nome">Nome:</label>
        <input type="text" id="nome">
        </section>
        <br>
        <section>  
            <label for="email">Email:</label>
            <input type="email" name="" id="email">
        </section>
        
        <section>  
            <input type="radio" value="1" name="1">opção 1
            <input type="radio" value="1" name="1">opção 2
            <input type="radio" value="1" name="1">opção 3
            <input type="radio" value="1" name="1">opção 4
        </section>
        <section>
            <h3>Espaço para digitar a resposta:</h3>
        </section>
        <section>  
            <textarea name="" id="" cols="30" rows="10" placeholder="Digite Algo...."></textarea>
        </section>

        <section>
            <label for="data">Data:</label>
            <input type="date" name="" id="data">
        </section>
        <br>
        <section>
            <label for="concordo1">Concordo 1:</label>
            <input type="checkbox" name="" id="concordo1">
            <br>
            <label for="concordo2">Concordo 2:</label>
            <input type="checkbox" name="" id="concordo2">
        </section>
        <section>
            <input type="submit" value="Enviar" required>
            <input type="reset" value="Apagar" required>
        </section>
        <button type="submit">Enviar</button>
    </form>
</body>
<script src="script.js"></script>
</html>
